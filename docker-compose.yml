version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: devlens
      POSTGRES_DB: devlens
    ports:
      - "5432:5432"
    volumes:
      - devlens_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devlens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - devlens_redis_data:/data

volumes:
  devlens_postgres_data:
  devlens_redis_data: